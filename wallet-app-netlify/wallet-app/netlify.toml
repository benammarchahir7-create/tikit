[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirige /api/* vers les Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — toutes les routes vers index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
